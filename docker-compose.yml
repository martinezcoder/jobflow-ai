services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jobflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jobflow}
      POSTGRES_DB: ${POSTGRES_DB:-jobflow_ai_development}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-jobflow} -d ${POSTGRES_DB:-jobflow_ai_development}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    stdin_open: true
    tty: true
    command: sleep infinity
    volumes:
      - .:/rails:cached
    ports:
      - "${RAILS_PORT:-3000}:3000"
    environment:
      DATABASE_HOST: db
      DATABASE_USER: ${POSTGRES_USER:-jobflow}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-jobflow}
      DATABASE_NAME: ${POSTGRES_DB:-jobflow_ai_development}
      RAILS_ENV: development
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
