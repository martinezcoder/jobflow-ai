services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jobflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jobflow}
      POSTGRES_DB: ${POSTGRES_DB:-jobflow_ai_development}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-jobflow} -d ${POSTGRES_DB:-jobflow_ai_development}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    user: "${UID:-1000}:${GID:-1000}"
    stdin_open: true
    tty: true
    command: bin/dev
    volumes:
      - .:/rails:cached
      - bundle_data:/usr/local/bundle
    ports:
      - "${RAILS_PORT:-3000}:3000"
    environment:
      BINDING: 0.0.0.0
      BUNDLE_PATH: /usr/local/bundle
      XDG_CACHE_HOME: /rails/tmp/cache
      DATABASE_HOST: db
      DATABASE_USER: ${POSTGRES_USER:-jobflow}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-jobflow}
      DATABASE_NAME: ${POSTGRES_DB:-jobflow_ai_development}
      DATABASE_URL: postgres://${POSTGRES_USER:-jobflow}:${POSTGRES_PASSWORD:-jobflow}@db:5432/${POSTGRES_DB:-jobflow_ai_development}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  bundle_data:
